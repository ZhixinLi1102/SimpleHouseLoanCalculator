<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>房贷还款计算器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="week3styles.css">
    
</head>
<body>
    <!-- 导航栏 -->
    <nav id="nav">
    <div class="nav-header">
    <div class="logo">
        <a href="#">房贷还款计算器</a>
    </div>
    <button class="foldMenu">☰</button>
    </div>
    <!-- 菜单 -->
    <div id="nav-menu">
        <ul class="nav-menu">
           
            <li><a href="#">2026房贷计算器</a></li>
            <li><a href="#">提前还贷计算器</a></li>
            <li><a href="#">购房能力评估计算器</a></li>
        </ul>
        <!-- 折叠菜单事件 -->
        <script>
            const foldMenu = document.querySelector('.foldMenu');
            const navMenu = document.querySelector('.nav-menu');
            foldMenu.addEventListener('click',() => {
                navMenu.classList.toggle('active');
            });
        </script>
    </div>
    </nav>



    <!-- 2026房贷计算器 -->
    <div class="textEare row">
        
            <div class="column inputBox">
                
                <a>还款方式&emsp;</a>
                <br>
                    <label><input type="radio" name="repayFun" value="sameAcc" checked>等额本息</label>
                    <label><input type="radio" name="repayFun" value="samePri">等额本金</label>
                <br>
                <a>贷款类型&emsp;</a>
                <br>
                    <label><input type="radio" name="loanFun" value="gjjLoan" checked>公积金贷</label>
                    <label><input type="radio" name="loanFun" value="busLoan">商业贷款</label>
                    <label><input type="radio" name="loanFun" value="comLoan">组合贷</label>
                <br>
                <a>计算方式&emsp;</a>
                <br>
                    <label><input type="radio" name="calFun" value="allLoan" checked>根据贷款总额</label>
                    <label><input type="radio" name="calFun" value="notLoan">根据按揭比例 </label>
                <!-- 输入参数区域 -->
                    <!-- 贷款总额 -->
                    <div class="inputRow">
                        <label for="sumLoan">贷款总额（万元）</label>
                        <input type="number" id="sumLoan" value="" min="0">                       
                    </div>
                     <!-- 贷款年限的select框 -->
                    <div class="inputRow">                  
                        <label for="year">贷款年限</label>
                        <br>
                        <select name="year" id="year">
                            <option value="1">1年（12期）</option>
                            <option value="2">2年（24期）</option>
                            <option value="3">3年（36期）</option>
                            <option value="4">4年（48期）</option>
                            <option value="5">5年（60期）</option>
                            <option value="6">6年（72期）</option>
                            <option value="7">7年（84期）</option>
                            <option value="8">8年（96期）</option>
                            <option value="9">9年（108期）</option>
                            <option value="10">10年（120期）</option>
                            <option value="11">11年（132期）</option>
                            <option value="12">12年（144期）</option>
                            <option value="13">13年（156期）</option>
                            <option value="14">14年（168期）</option>
                            <option value="15">15年（180期）</option>
                            <option value="16">16年（192期）</option>
                            <option value="17">17年（204期）</option>
                            <option value="18">18年（216期）</option>
                            <option value="19">19年（228期）</option>
                            <option value="20">20年（240期）</option>
                            <option value="21">21年（252期）</option>
                            <option value="22">22年（264期）</option>
                            <option value="23">23年（276期）</option>
                            <option value="24">24年（288期）</option>
                            <option value="25">25年（300期）</option>
                            <option value="26">26年（312期）</option>
                            <option value="27">27年（324期）</option>
                            <option value="28">28年（336期）</option>
                            <option value="29">29年（348期）</option>
                            <option value="30">30年（360期）</option>
                        </select>                       
                    </div>
                    <!-- 利率输入框 -->
                    <div class="inputRow" style="width: 50%;">
                        <label for="rate">利率（单位：%）</label>
                        <label><input type="number" id="rate" value="" min="0"></label>
                    </div>
                        <label><input type="radio" name="rateFun" value="priRate" >基准利率</label>
                        <label><input type="radio" name="rateFun" value="secondRate">第二套房利率</label>
                        <label><input type="radio" name="rateFun" value="inputRate">手动输入</label>
                        <br>
                        <button class="calculateBtn" id="calculateBtn">开始计算</button>           
            </div>

            <!-- 输出框 -->
                    
                    <div class="outputBox">    
                    <div class="hidBox">
                        <img src="images\Calculator.png">       
                        <p>你要贷款买房？快来算算吧！</p>
                    </div>               
                    <div class="result-box hidden">
                        <div class="result-title">计算结果</div>
 
                        <div class="result-details">
                        <div class="result-item">
                            <span class="result-item-label">月均还款（元）</span>
                            <span class="result-item-value" id="monPay" style="color: brown;"></span>
                        </div>
                        <div class="result-item">
                            <span class="result-item-label">贷款总额</span>
                            <span class="result-item-value" id="totalLoan"> 元</span>
                        </div>
                        <div class="result-item">
                            <span class="result-item-label">贷款期限</span>
                            <span class="result-item-value" id="loanDdl"></span>
                        </div>
                        <div class="result-item">
                            <span class="result-item-label">年利率</span>
                            <span class="result-item-value" id="yearRate"></span>
                        </div>
                        <div class="result-item">
                            <span class="result-item-label">还款方式</span>
                            <span class="result-item-value" id="repayFun"></span>
                        </div>
                        <div class="result-item">
                            <span class="result-item-label">支付利息总额</span>
                            <span class="result-item-value" id="totalAcc" style="color: brown;"></span>
                        </div>
                        <div class="result-item">
                            <span class="result-item-label">还款总额</span>
                            <span class="result-item-value" id="totalPay" style="color: brown;"></span>
                        </div>
                </div>
            </div>
            
        </div>
    </div>
    </div>
    <script>
    // 输入元素
    const sumLoanInput = document.getElementById('sumLoan');
    const yearSelect = document.getElementById('year');
    const rateInput = document.getElementById('rate');
    const calculateBtn = document.getElementById('calculateBtn');

    // 输出元素
    const monPaySpan = document.getElementById('monPay');
    const totalLoanSpan = document.getElementById('totalLoan');
    const loanDdlSpan = document.getElementById('loanDdl');
    const yearRateSpan = document.getElementById('yearRate');
    const repayFunSpan = document.getElementById('repayFun');
    const totalAccSpan = document.getElementById('totalAcc');
    const totalPaySpan = document.getElementById('totalPay');

    // 单选按钮组
    const repayRadios = document.querySelectorAll('input[name="repayFun"]');
    const loanTypeRadios = document.querySelectorAll('input[name="loanFun"]');
    const calTypeRadios = document.querySelectorAll('input[name="calFun"]');
    const rateTypeRadios = document.querySelectorAll('input[name="rateFun"]');

    // 利率常量
    const RATES = {
        gjjBase: 3.25,
        busBase: 4.9,
        secondRateBase: 1.1
    };

    // 还款方式获取
    function getRepayFun() {
        for (let radio of repayRadios) {
            if (radio.checked) {
                return radio.value;
            }
        }
        return 'sameAcc';
    }

    // 贷款类型获取
    function getLoanFun() {
        for (let radio of loanTypeRadios) {
            if (radio.checked)
                return radio.value;
        }
        return 'gjjLoan';
    }

    // 计算方式获取
    function getCalFun() {
        for (let radio of calTypeRadios) {
            if (radio.checked)
                return radio.value;
        }
        return 'allLoan';
    }

    // 利率方式获取
    function getRateFun() {
        for (let radio of rateTypeRadios) {
            if (radio.checked)
                return radio.value;
        }
        return 'priRate';
    }

    // 年利率计算
    function getYearRate() {
        const loanType = getLoanFun();
        const rateType = getRateFun();
        let baseRate = null;
        
        // 确定基础利率
        if (loanType === 'gjjLoan') {
            baseRate = RATES.gjjBase;
        } else if (loanType === 'busLoan') {
            baseRate = RATES.busBase;
        } else if (loanType === 'comLoan') {
            // 组合贷通常取商业贷款利率，这里简化为商业贷利率
            baseRate = RATES.busBase;
        }

        // 利率选择（基准利率、二套房）
        if (rateType === 'priRate') {
            return baseRate;
        } else if (rateType === 'secondRate') {
            return baseRate * RATES.secondRateBase;
        } else if (rateType === 'inputRate') {
            let manualRate = parseFloat(rateInput.value);
            return isNaN(manualRate) ? baseRate : manualRate;
        }
        
        return baseRate;
    }

    // 将利率自动填充到利率输入框中
    function updateRateInput() {
        const yearRate = getYearRate();
        if (!isNaN(yearRate) && yearRate > 0) {
            rateInput.value = yearRate.toFixed(2);
        }
    }

    // 监听利率选择按钮变化，自动更新
    rateTypeRadios.forEach(radio => {
        radio.addEventListener('change', () => {
            if (radio.checked) {
                updateRateInput();
            }
        });
    });
    
    // 监听贷款类型（基准还是二套）
    loanTypeRadios.forEach(radio => {
        radio.addEventListener('change', () => {
            updateRateInput();
        });
    });

    // 手动修改利率输入框
    rateInput.addEventListener('input', () => {
        if (rateInput.value.trim() !== '') {
            // 选中手动输入选项
            document.querySelector('input[name="rateFun"][value="inputRate"]').checked = true;
        }
    });

    // 主计算函数
    function calculate() {
        // 获取输入值
        let wanLoan = parseFloat(sumLoanInput.value);
        if (isNaN(wanLoan) || wanLoan <= 0) {
            alert('请输入有效的贷款总额');
            return;
        }
        const loanAmount = wanLoan * 10000;

        let years = parseFloat(yearSelect.value);
        const months = years * 12;

        let yearRate = getYearRate();

        if (isNaN(yearRate) || yearRate <= 0) {
            alert('请设置正确的利率');
            return;
        }
       
        const monthRate = yearRate / 100 / 12;

        const repayFun = getRepayFun();

        let monthPay = 0;
        let totalInterest = 0;
        let totalPay = 0;

        if (repayFun === 'sameAcc') {
            // 等额本息计算
            if (monthRate === 0) {
                monthPay = loanAmount / months;
            } else {
                const factor = Math.pow(1 + monthRate, months);
                monthPay = loanAmount * monthRate * factor / (factor - 1);
            }
            totalPay = monthPay * months;
            totalInterest = totalPay - loanAmount;
        } else {
            // 等额本金计算
            let monthlyPrincipal = loanAmount / months; // 每月本金
            let remainingPrincipal = loanAmount; // 剩余本金
            let firstMonthPayment = 0; // 首月还款
            let sumPayments = 0; // 总还款额
            
            for (let i = 1; i <= months; i++) {
                let interestPart = remainingPrincipal * monthRate;
                let monthPayment = monthlyPrincipal + interestPart;
                
                if (i === 1) {
                    firstMonthPayment = monthPayment;
                }
                
                sumPayments += monthPayment;
                remainingPrincipal -= monthlyPrincipal;
            }
            
            monthPay = firstMonthPayment; // 展示首月还款
            totalPay = sumPayments;
            totalInterest = totalPay - loanAmount;
        }

        // 格式化金额（保留两位小数）
        const formatMoney = (val) => val.toLocaleString(undefined, { 
            minimumFractionDigits: 2, 
            maximumFractionDigits: 2 
        });

        // 更新界面
        monPaySpan.textContent = formatMoney(monthPay);
        totalLoanSpan.textContent = formatMoney(loanAmount) + ' 元';
        loanDdlSpan.textContent = `${years}年（${months}期）`;
        yearRateSpan.textContent = yearRate.toFixed(2) + '%';
        repayFunSpan.textContent = repayFun === 'sameAcc' ? '等额本息' : '等额本金';
        totalAccSpan.textContent = formatMoney(totalInterest) + ' 元';
        totalPaySpan.textContent = formatMoney(totalPay) + ' 元';
        document.querySelector('.hidBox').classList.add('hidden');
        document.querySelector('.result-box').classList.remove('hidden');
    }

    // 初始化页面
    function initialize() {
    
        // 设置默认选中
        document.querySelector('input[name="loanFun"][value="busLoan"]').checked = true;
        document.querySelector('input[name="repayFun"][value="sameAcc"]').checked = true;
        document.querySelector('input[name="calFun"][value="allLoan"]').checked = true;
        
        
    }

    calculateBtn.addEventListener('click', calculate);
    
    // 页面加载时初始化
    document.addEventListener('DOMContentLoaded', initialize);
</script>
</body>
</html>
